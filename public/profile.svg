<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A" />
      <stop offset="50%" stop-color="#141414" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6DFD3" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#9C9486" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="30%" stop-color="#E6DFD3" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="circleClip">
      <circle cx="400" cy="360" r="220" />
    </clipPath>
  </defs>

  <!-- Background Aura / Glow behind silhouette -->
  <circle cx="400" cy="420" r="260" fill="#E6DFD3" opacity="0.06" filter="url(#glow)" />
  <circle cx="400" cy="380" r="180" fill="#E6DFD3" opacity="0.04" filter="url(#glow)" />

  <!-- Abstract Cinematic Geometric Halo -->
  <circle cx="400" cy="360" r="240" fill="none" stroke="#E6DFD3" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.25" />
  <circle cx="400" cy="360" r="260" fill="none" stroke="#FFFFFF" stroke-width="0.75" opacity="0.15" />

  <!-- Stylized Minimalist Silhouette Body/Suit -->
  <path d="M180,950 L240,650 Q280,580 340,560 L400,575 L460,560 Q520,580 560,650 L620,950 Z" fill="url(#bodyGrad)" />
  
  <!-- Suit Collar / Lapels -->
  <path d="M340,560 L400,680 L460,560 L420,550 L400,620 L380,550 Z" fill="#0D0D0D" stroke="#E6DFD3" stroke-width="1.5" stroke-opacity="0.4" />
  <path d="M400,620 L400,950" stroke="#E6DFD3" stroke-width="1" stroke-opacity="0.2" />

  <!-- Neck -->
  <path d="M365,460 L435,460 L445,565 L355,565 Z" fill="#1F1F1F" />
  <path d="M375,470 L400,550 L360,555 Z" fill="url(#rimLight)" opacity="0.3" />

  <!-- Head / Jawline Silhouette -->
  <path d="M330,340 Q330,230 400,220 Q470,230 470,340 Q475,400 445,450 Q425,480 400,485 Q375,480 355,450 Q325,400 330,340 Z" fill="url(#bodyGrad)" stroke="url(#rimLight)" stroke-width="2" />

  <!-- Cinematic Visor / Tech Glasses (Abstract Motion Designer Aesthetic) -->
  <path d="M345,330 Q400,345 455,330 L462,355 Q400,370 338,355 Z" fill="url(#accentGrad)" filter="url(#glow)" />
  <path d="M345,330 Q400,345 455,330 L462,355 Q400,370 338,355 Z" fill="#FFFFFF" opacity="0.85" />

  <!-- Subtle Facial Highlights & Contour Lines -->
  <path d="M400,220 L400,260" stroke="#E6DFD3" stroke-width="1.5" opacity="0.5" />
  <path d="M330,340 Q365,320 400,320 Q435,320 470,340" fill="none" stroke="#E6DFD3" stroke-width="0.75" opacity="0.3" />

  <!-- Shoulder Rim Highlights (Depth effect against dark bg) -->
  <path d="M180,950 L240,650 Q280,580 340,560" fill="none" stroke="url(#rimLight)" stroke-width="3" />
  <path d="M620,950 L560,650 Q520,580 460,560" fill="none" stroke="url(#rimLight)" stroke-width="3" />

  <!-- Futuristic Floating Grid Accents -->
  <g opacity="0.35" stroke="#E6DFD3" stroke-width="1">
    <line x1="220" y1="250" x2="260" y2="250" />
    <line x1="220" y1="250" x2="220" y2="290" />
    <circle cx="220" cy="250" r="3" fill="#E6DFD3" />

    <line x1="580" y1="480" x2="540" y2="480" />
    <line x1="580" y1="480" x2="580" y2="440" />
    <circle cx="580" cy="480" r="3" fill="#E6DFD3" />
  </g>
</svg>
